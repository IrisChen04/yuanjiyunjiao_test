<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>你是袁记哪道菜？</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:       #2D6A4F;
      --dark-green:  #1B4332;
      --mid-green:   #40916C;
      --light-green: #74C69D;
      --pale-green:  #D8F3DC;
      --cream:       #F8FBF9;
      --warm-white:  #FFFFFF;
      --text-dark:   #1B2E22;
      --text-mid:    #2D5A3D;
      --text-light:  #6B9E7E;
      --shadow:      rgba(45,106,79,0.15);
    }
    body { font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background:var(--cream); color:var(--text-dark); min-height:100vh; overflow-x:hidden; }
    .screen { display:none; min-height:100vh; }
    .screen.active { display:flex; flex-direction:column; }

    /* COVER */
    #cover { background:linear-gradient(160deg,#2D6A4F 0%,#1B4332 55%,#081C15 100%); align-items:center; justify-content:center; text-align:center; padding:40px 24px; position:relative; overflow:hidden; }
    #cover::before { content:''; position:absolute; top:-60px; right:-60px; width:260px; height:260px; background:rgba(116,198,157,0.08); border-radius:50%; }
    #cover::after  { content:''; position:absolute; bottom:-80px; left:-40px; width:320px; height:320px; background:rgba(116,198,157,0.05); border-radius:50%; }
    .cover-deco { position:absolute; top:30%; left:-20px; width:120px; height:120px; background:rgba(116,198,157,0.06); border-radius:50%; }
    .cover-badge { display:inline-block; background:rgba(116,198,157,0.18); border:1px solid rgba(116,198,157,0.4); color:var(--light-green); font-size:12px; letter-spacing:2px; padding:6px 16px; border-radius:20px; margin-bottom:24px; animation:fadeDown 0.6s ease both; }
    .cover-emoji { font-size:84px; display:block; margin-bottom:20px; animation:bounceIn 0.8s ease 0.2s both; filter:drop-shadow(0 8px 16px rgba(0,0,0,0.3)); }
    .cover-title { font-size:34px; font-weight:900; color:#fff; line-height:1.2; margin-bottom:10px; animation:fadeUp 0.6s ease 0.3s both; }
    .cover-title span { color:var(--light-green); }
    .cover-sub { font-size:15px; color:rgba(255,255,255,0.7); margin-bottom:32px; line-height:1.7; animation:fadeUp 0.6s ease 0.4s both; }
    .cover-tags { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:40px; animation:fadeUp 0.6s ease 0.5s both; }
    .tag { background:rgba(116,198,157,0.12); border:1px solid rgba(116,198,157,0.25); color:rgba(255,255,255,0.85); font-size:12px; padding:5px 12px; border-radius:12px; }
    .btn-start { background:linear-gradient(135deg,var(--light-green),var(--mid-green)); color:#fff; font-size:18px; font-weight:800; padding:16px 52px; border:none; border-radius:50px; cursor:pointer; box-shadow:0 8px 28px rgba(64,145,108,0.45); animation:fadeUp 0.6s ease 0.6s both; transition:transform 0.2s,box-shadow 0.2s; letter-spacing:2px; }
    .btn-start:active { transform:scale(0.96); }
    .cover-note { margin-top:20px; font-size:12px; color:rgba(255,255,255,0.35); animation:fadeUp 0.6s ease 0.7s both; }

    /* QUIZ */
    #quiz { background:var(--cream); }
    .quiz-header { background:linear-gradient(135deg,var(--green),var(--dark-green)); padding:20px 20px 28px; }
    .quiz-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .quiz-back { background:rgba(255,255,255,0.12); border:none; color:#fff; width:36px; height:36px; border-radius:50%; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .quiz-counter { font-size:13px; color:rgba(255,255,255,0.85); font-weight:700; }
    .quiz-group-label { font-size:12px; color:var(--light-green); letter-spacing:1px; }
    .progress-bar { height:5px; background:rgba(255,255,255,0.15); border-radius:3px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--light-green),#B7E4C7); border-radius:3px; transition:width 0.4s ease; }
    .quiz-body { padding:24px 20px 40px; flex:1; }
    .question-card { background:var(--warm-white); border-radius:20px; padding:24px 20px; margin-bottom:20px; box-shadow:0 4px 20px var(--shadow); border:1px solid rgba(45,106,79,0.08); }
    .question-num { font-size:11px; font-weight:700; color:var(--mid-green); letter-spacing:2px; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
    .question-num::before { content:''; display:inline-block; width:3px; height:14px; background:var(--green); border-radius:2px; }
    .question-text { font-size:17px; font-weight:700; color:var(--text-dark); line-height:1.6; }
    .options-list { display:flex; flex-direction:column; gap:12px; }
    .option-btn { background:var(--warm-white); border:2px solid rgba(45,106,79,0.1); border-radius:16px; padding:15px 16px; text-align:left; cursor:pointer; transition:all 0.2s ease; display:flex; align-items:flex-start; gap:12px; font-size:15px; color:var(--text-dark); line-height:1.5; box-shadow:0 2px 8px rgba(0,0,0,0.03); }
    .option-btn:active { transform:scale(0.98); }
    .option-btn.selected { background:linear-gradient(135deg,#EBF8F0,#D8F3DC); border-color:var(--green); box-shadow:0 4px 16px rgba(45,106,79,0.18); }
    .option-letter { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; min-width:28px; background:var(--pale-green); color:var(--green); font-weight:800; font-size:13px; border-radius:8px; transition:all 0.2s; }
    .option-btn.selected .option-letter { background:var(--green); color:#fff; }
    .btn-next { width:100%; background:linear-gradient(135deg,var(--green),var(--dark-green)); color:#fff; font-size:17px; font-weight:700; padding:16px; border:none; border-radius:16px; cursor:pointer; box-shadow:0 6px 20px rgba(45,106,79,0.3); transition:all 0.2s; letter-spacing:1px; opacity:0.35; pointer-events:none; }
    .btn-next.enabled { opacity:1; pointer-events:auto; }
    .btn-next.enabled:active { transform:scale(0.98); }

    /* LOADING */
    #loading { background:linear-gradient(160deg,#2D6A4F 0%,#1B4332 60%,#081C15 100%); align-items:center; justify-content:center; text-align:center; padding:40px 24px; }
    .loading-emoji { font-size:72px; display:block; margin-bottom:24px; animation:floatBounce 1.2s ease-in-out infinite; }
    .loading-title { font-size:22px; font-weight:800; color:#fff; margin-bottom:10px; }
    .loading-sub { font-size:14px; color:rgba(255,255,255,0.55); margin-bottom:40px; line-height:1.6; }
    .loading-dots { display:flex; gap:8px; justify-content:center; }
    .dot { width:10px; height:10px; background:var(--light-green); border-radius:50%; animation:dotBounce 1.2s ease infinite; }
    .dot:nth-child(2) { animation-delay:0.2s; }
    .dot:nth-child(3) { animation-delay:0.4s; }

    /* RESULT */
    #result { background:var(--cream); padding-bottom:48px; }
    .result-hero { background:linear-gradient(160deg,var(--green) 0%,var(--dark-green) 100%); padding:52px 24px 64px; text-align:center; position:relative; overflow:hidden; }
    .result-hero::before { content:''; position:absolute; top:-50px; right:-50px; width:220px; height:220px; background:rgba(116,198,157,0.08); border-radius:50%; }
    .result-hero::after  { content:''; position:absolute; bottom:-60px; left:-30px; width:180px; height:180px; background:rgba(116,198,157,0.06); border-radius:50%; }
    .result-label { display:inline-block; background:rgba(116,198,157,0.18); border:1px solid rgba(116,198,157,0.35); color:var(--light-green); font-size:11px; letter-spacing:2px; padding:5px 14px; border-radius:20px; margin-bottom:20px; }
    .result-emoji { font-size:92px; display:block; margin-bottom:16px; animation:bounceIn 0.8s ease both; filter:drop-shadow(0 8px 20px rgba(0,0,0,0.25)); }
    .result-dish-name { font-size:28px; font-weight:900; color:#fff; margin-bottom:10px; position:relative; z-index:1; }
    .result-tagline { font-size:14px; color:rgba(255,255,255,0.75); font-style:italic; line-height:1.7; padding:0 16px; position:relative; z-index:1; }
    .result-body { padding:0 20px; margin-top:-28px; position:relative; z-index:1; }
    .result-card { background:var(--warm-white); border-radius:20px; padding:22px 20px; margin-bottom:14px; box-shadow:0 4px 20px var(--shadow); border:1px solid rgba(45,106,79,0.07); }
    .result-card-title { font-size:13px; font-weight:700; color:var(--green); letter-spacing:1px; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
    .result-desc { font-size:15px; color:var(--text-mid); line-height:1.85; font-style:italic; }
    .keywords-wrap { display:flex; flex-wrap:wrap; gap:8px; }
    .keyword-tag { background:linear-gradient(135deg,#EBF8F0,#D8F3DC); border:1px solid rgba(45,106,79,0.18); color:var(--green); font-size:13px; font-weight:600; padding:6px 14px; border-radius:20px; }
    .trait-text { font-size:14px; color:var(--text-mid); line-height:1.7; }
    .score-bars { display:flex; flex-direction:column; gap:13px; }
    .score-row { display:flex; align-items:center; gap:10px; }
    .score-label { font-size:12px; color:var(--text-light); width:52px; flex-shrink:0; }
    .score-track { flex:1; height:8px; background:var(--pale-green); border-radius:4px; overflow:hidden; }
    .score-bar { height:100%; background:linear-gradient(90deg,var(--green),var(--light-green)); border-radius:4px; transition:width 1s ease 0.4s; width:0%; }
    .score-val { font-size:12px; font-weight:700; color:var(--green); width:32px; text-align:right; }
    .btn-share { width:100%; background:linear-gradient(135deg,var(--mid-green),var(--light-green)); color:#fff; font-size:16px; font-weight:700; padding:16px; border:none; border-radius:16px; cursor:pointer; box-shadow:0 6px 20px rgba(64,145,108,0.35); margin-top:12px; letter-spacing:1px; }
    .btn-retry { width:100%; background:linear-gradient(135deg,var(--green),var(--dark-green)); color:#fff; font-size:16px; font-weight:700; padding:16px; border:none; border-radius:16px; cursor:pointer; box-shadow:0 6px 20px rgba(45,106,79,0.3); margin-top:8px; letter-spacing:1px; }

    @keyframes fadeDown  { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp    { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:translateY(0)} }
    @keyframes bounceIn  { 0%{transform:scale(0.3);opacity:0} 60%{transform:scale(1.12)} 80%{transform:scale(0.94)} 100%{transform:scale(1);opacity:1} }
    @keyframes floatBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    @keyframes dotBounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }
    .slide-in { animation:fadeUp 0.32s ease both; }
  </style>
</head>
<body>

<div id="cover" class="screen active">
  <div class="cover-deco"></div>
  <div style="position:relative;z-index:1;">
    <div class="cover-badge">🧪 心理性格测试</div>
    <span class="cover-emoji">🥟</span>
    <h1 class="cover-title">你是袁记的<br/><span>哪道菜？</span></h1>
    <p class="cover-sub">24道题，测出你的专属饺子人格<br/>基于大五人格理论科学设计</p>
    <div class="cover-tags">
      <span class="tag">🔬 心理学驱动</span>
      <span class="tag">🥟 8种结果</span>
      <span class="tag">⏱️ 约3分钟</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">开始测试</button>
    <p class="cover-note">选择最符合你真实感受的答案效果最佳</p>
  </div>
</div>

<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-nav">
      <button class="quiz-back" onclick="goBack()">&#8249;</button>
      <span class="quiz-counter" id="counter">1 / 24</span>
      <span class="quiz-group-label" id="group-label">能量感</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width:4%"></div>
    </div>
  </div>
  <div class="quiz-body">
    <div class="question-card" id="question-card">
      <div class="question-num" id="q-num">Q1</div>
      <div class="question-text" id="q-text"></div>
    </div>
    <div class="options-list" id="options-list"></div>
    <br/>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">下一题 →</button>
  </div>
</div>

<div id="loading" class="screen">
  <div>
    <span class="loading-emoji">🥟</span>
    <div class="loading-title">正在包你的专属饺子…</div>
    <div class="loading-sub">心理学家正在分析你的人格特质<br/>请稍等片刻</div>
    <div class="loading-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>
</div>

<div id="result" class="screen">
  <div class="result-hero">
    <div class="result-label">你的专属饺子人格</div>
    <span class="result-emoji" id="r-emoji"></span>
    <div class="result-dish-name" id="r-name"></div>
    <div class="result-tagline" id="r-tagline"></div>
  </div>
  <div class="result-body">
    <div class="result-card">
      <div class="result-card-title">📖 你的饺子故事</div>
      <div class="result-desc" id="r-desc"></div>
    </div>
    <div class="result-card">
      <div class="result-card-title">✨ 性格关键词</div>
      <div class="keywords-wrap" id="r-keywords"></div>
    </div>
    <div class="result-card">
      <div class="result-card-title">💪 你的优势</div>
      <div class="trait-text" id="r-strength"></div>
    </div>
    <div class="result-card">
      <div class="result-card-title">🔍 你的盲点</div>
      <div class="trait-text" id="r-blind"></div>
    </div>
    <div class="result-card">
      <div class="result-card-title">🌱 适合你的生活方式</div>
      <div class="trait-text" id="r-life"></div>
    </div>
    <div class="result-card">
      <div class="result-card-title">📊 你的人格维度</div>
      <div class="score-bars" id="r-scores"></div>
    </div>
    <button class="btn-share" onclick="shareResult()">📤 分享给朋友测一测</button>
    <button class="btn-retry" onclick="retryQuiz()">🔄 重新测试</button>
  </div>
</div>

<script>
var groups = ['🔥 能量感','🏛️ 传统/创新','👥 社交性','⚓ 稳定性','🎨 丰富性','🎯 综合'];

var questions = [
  { group:0, text:'周五晚上，你推开袁记云饺的门，你希望看到的是？',
    options:['安静的角落小桌，一个人，一碗饺子，一杯热茶 🍵','熟悉的朋友，两三人，边吃边聊，不紧不慢','一大桌人，菜一道道上，热气腾腾，嗷嗷叫着加菜','我就是那个订了最大包间、最后一个离开、还在问「再来一笼？」的人'],
    dim:0, scores:[0,1,2,3] },
  { group:0, text:'如果你把今天在袁记吃饺子的体验发到朋友圈，你会怎么发？',
    options:['不发，好吃是我自己的事','拍一张好看的图，配几个字，发完就不看了','拍图+写感受，顺手@了一起来的朋友','拍视频、写长文、做九宫格，恨不得让全世界知道我在吃袁记'],
    dim:0, scores:[0,1,2,3] },
  { group:0, text:'袁记的红油抄手摆在你面前，你的第一反应是？',
    options:['先问一句：这个辣吗？能不能换清汤？','尝一个，可以接受，但我更爱原味的','直接开吃，辣得刚刚好，这才是吃饺子的感觉','让服务员再加一勺红油，不够辣不够爽 🌶️'],
    dim:0, scores:[0,1,2,3] },
  { group:0, text:'你在袁记吃饭，旁边桌的人最可能怎么描述你？',
    options:['「那个人一直低头吃饭，安安静静的」','「感觉是个温柔的人，偶尔笑一下很好看」','「很开朗，一直在聊天，感觉认识他/她很开心」','「全场最有存在感的，连服务员都记住他/她了」'],
    dim:0, scores:[0,1,2,3] },
  { group:1, text:'拿到袁记菜单，你的第一个动作是？',
    options:['直接翻到「招牌推荐」，点销量第一，经典不会错','问服务员今天什么好吃，听推荐再决定','从头到尾扫一遍，挑几道没点过的试试','专门找菜单角落里那道最冷门的菜，就是要踩雷也值得'],
    dim:1, scores:[0,1,2,3] },
  { group:1, text:'袁记每隔一段时间会出新品，你的态度是？',
    options:['不感兴趣，我来就是为了那几道老朋友','会看一眼，但大概率还是点回熟悉的','新品必点，万一好吃呢？','新品上线当天就去打卡，还要发评测'],
    dim:1, scores:[0,1,2,3] },
  { group:1, text:'袁记有两种饺子师傅：一种二十年只做猪肉大葱，皮薄馅匀无人能及；另一种不断研发新口味，芝士、黑松露、榴莲馅都敢试。你更欣赏哪种？',
    options:['前者，把一件事做到极致就是最高境界','前者为主，但也需要一点与时俱进','后者更有意思，创新才能让饺子文化走得更远','后者！榴莲饺子我第一个去吃！'],
    dim:1, scores:[0,1,2,3] },
  { group:1, text:'你上一次在袁记点了一道从没点过的新口味是什么时候？',
    options:['想不起来了，我每次都点一样的','大概半年前？偶尔会换换','上个月就有，我隔一段时间就想试新的','上次来就点了新的，我从不重复点同一道菜'],
    dim:1, scores:[0,1,2,3] },
  { group:2, text:'一场袁记聚餐结束，大家散场了，你是什么状态？',
    options:['终于可以一个人待着了，社交耗尽，需要充电','有点累，但睡一觉就好，整体还不错','意犹未尽，在门口又聊了半小时才走','我就是那个说「要不去下一场？」的人'],
    dim:2, scores:[0,1,2,3] },
  { group:2, text:'你在袁记吃饭，最理想的座位是？',
    options:['靠窗的独座，一个人，安静看窗外','两人小桌，旁边有人但不需要一直说话','四人桌，可以随时聊，气氛刚好','大圆桌！人越多越好，菜转起来才有感觉'],
    dim:2, scores:[0,1,2,3] },
  { group:2, text:'朋友深夜发消息说失恋了很难受，你的第一反应是？',
    options:['发几句安慰的话，但坦白说我不太擅长处理这种情况','认真听他/她说完，给出我觉得最有用的建议','陪他/她聊到凌晨，一直聊到他/她好一点','「你在哪？我现在去找你，顺便带你去吃袁记，吃饺子什么都会好的」🥟'],
    dim:2, scores:[0,1,2,3] },
  { group:2, text:'你心目中最完美的袁记用餐场景是？',
    options:['一个人，一碗招牌水饺，一本书或者一部剧，安静又自由','两三个最亲近的人，边吃边聊那些不能对外人说的事','五六个朋友，热闹但不嘈杂，每人点不同的分着吃','大桌家庭聚餐，老少三代，蒸饺煎饺水饺全上，越乱越有烟火气'],
    dim:2, scores:[0,1,2,3] },
  { group:3, text:'袁记出了一款神秘盲盒饺子——不告诉你馅料，可能是你最爱的，也可能是你最怕的，你会点吗？',
    options:['不点，我花钱吃饭不是来冒险的','先问问服务员有没有什么提示，再决定','有点犹豫，但可能会试，大不了吃不完','直接点两份！不确定才刺激！'],
    dim:3, scores:[0,1,2,3] },
  { group:3, text:'你和朋友约好去袁记，你的准备方式是？',
    options:['提前看好菜单、查好停车、确认排队情况，万事俱备','大概知道想吃什么，其他到了再说','就知道要去吃饺子，具体点什么到了再看','说走就走，连哪家门店都没定，边走边找'],

var currentQ = 0;
var answers = [];
var scores = [0,0,0,0,0];

for(var i=0;i<24;i++) answers.push(null);

function showScreen(id) {
  var screens = document.querySelectorAll('.screen');
  for(var i=0;i<screens.length;i++) screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startQuiz() {
  currentQ = 0;
  answers = [];
  for(var i=0;i<24;i++) answers.push(null);
  scores = [0,0,0,0,0];
  renderQuestion();
  showScreen('quiz');
}

function renderQuestion() {
  var q = questions[currentQ];
  var total = questions.length;
  document.getElementById('counter').textContent = (currentQ+1) + ' / ' + total;
  document.getElementById('group-label').textContent = groups[q.group];
  document.getElementById('progress').style.width = (((currentQ+1)/total)*100) + '%';
  document.getElementById('q-num').textContent = 'Q' + (currentQ+1);
  document.getElementById('q-text').textContent = q.text;

  var list = document.getElementById('options-list');
  list.innerHTML = '';
  var letters = ['A','B','C','D'];
  for(var i=0;i<q.options.length;i++) {
    (function(idx){
      var btn = document.createElement('button');
      btn.className = 'option-btn' + (answers[currentQ] === idx ? ' selected' : '');
      btn.innerHTML = '<span class="option-letter">' + letters[idx] + '</span><span>' + q.options[idx] + '</span>';
      btn.onclick = function(){ selectOption(idx); };
      list.appendChild(btn);
    })(i);
  }

  var nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = currentQ === total-1 ? '查看结果 🥟' : '下一题 →';
  nextBtn.className = 'btn-next' + (answers[currentQ] !== null ? ' enabled' : '');

  var qc = document.getElementById('question-card');
  qc.classList.remove('slide-in');
  void qc.offsetWidth;
  qc.classList.add('slide-in');
  list.classList.remove('slide-in');
  void list.offsetWidth;
  list.classList.add('slide-in');
}

function selectOption(idx) {
  answers[currentQ] = idx;
  var btns = document.querySelectorAll('.option-btn');
  for(var i=0;i<btns.length;i++) {
    if(i===idx) btns[i].classList.add('selected');
    else btns[i].classList.remove('selected');
  }
  document.getElementById('btn-next').classList.add('enabled');
}

function nextQuestion() {
  if(answers[currentQ] === null) return;
  if(currentQ < questions.length-1) {
    currentQ++;
    renderQuestion();
  } else {
    calculateResult();
  }
}

function goBack() {
  if(currentQ > 0) { currentQ--; renderQuestion(); }
  else showScreen('cover');
}

function calculateResult() {
  showScreen('loading');
  scores = [0,0,0,0,0];
  for(var qi=0;qi<answers.length;qi++) {
    var ans = answers[qi];
    if(ans === null) continue;
    var q = questions[qi];
    if(q.multiDim) {
      var ds = q.dimScores[ans];
      for(var d=0;d<ds.length;d++) scores[d] += ds[d];
    } else {
      scores[q.dim] += q.scores[ans];
    }
  }
  setTimeout(showResult, 2200);
}

function showResult() {
  var matched = null;
  for(var i=0;i<results.length;i++) {
    if(results[i].match(scores)) { matched = results[i]; break; }
  }
  if(!matched) {
    var maxVal = scores[0], maxIdx = 0;
    for(var i=1;i<scores.length;i++) { if(scores[i]>maxVal){ maxVal=scores[i]; maxIdx=i; } }
    matched = results[Math.min(maxIdx, results.length-1)];
  }

  document.getElementById('r-emoji').textContent = matched.emoji;
  document.getElementById('r-name').textContent = matched.name;
  document.getElementById('r-tagline').textContent = matched.tagline;
  document.getElementById('r-desc').textContent = matched.desc;
  document.getElementById('r-strength').textContent = matched.strength;
  document.getElementById('r-blind').textContent = matched.blind;
  document.getElementById('r-life').textContent = matched.life;

  var kw = document.getElementById('r-keywords');
  kw.innerHTML = '';
  for(var i=0;i<matched.keywords.length;i++) {
    var span = document.createElement('span');
    span.className = 'keyword-tag';
    span.textContent = matched.keywords[i];
    kw.appendChild(span);
  }

  var dimNames = ['能量感','创新度','社交性','冒险性','丰富性'];
  var sb = document.getElementById('r-scores');
  sb.innerHTML = '';
  for(var i=0;i<dimNames.length;i++) {
    var pct = Math.round((scores[i]/12)*100);
    var row = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = '<span class="score-label">' + dimNames[i] + '</span>' +
      '<div class="score-track"><div class="score-bar" data-pct="' + pct + '"></div></div>' +
      '<span class="score-val">' + pct + '%</span>';
    sb.appendChild(row);
  }

  showScreen('result');
  setTimeout(function(){
    var bars = document.querySelectorAll('.score-bar');
    for(var i=0;i<bars.length;i++) bars[i].style.width = bars[i].getAttribute('data-pct') + '%';
  }, 120);
}

function retryQuiz() { startQuiz(); }

function shareResult() {
  var name = document.getElementById('r-name').textContent;
  var text = '我在袁记云饺性格测试中测出来是「' + name + '」！你是哪道菜？快来测测 🥟';
  if(navigator.share) {
    navigator.share({ title:'你是袁记哪道菜？', text:text, url:window.location.href });
  } else if(navigator.clipboard) {
    navigator.clipboard.writeText(text + '\n' + window.location.href)
      .then(function(){ alert('已复制到剪贴板，快去分享给朋友吧！🥟'); });
  } else {
    alert(text);
  }
}
